<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Move Gasy — Connexion Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <div class="login-card">
        <div class="brand-header">
            <div class="brand-logo"><i class="bi bi-water"></i></div>
            <span class="brand-name">MOVE GASY</span>
            <span class="brand-sub">Administration & Sécurité</span>
        </div>

        <div class="alert-error" id="error-msg">
            Identifiants invalides. Veuillez réessayer.
        </div>

        <form action="administration.html">
            <div class="mb-3">
                <label class="form-label">Email Professionnel</label>
                <input type="email" class="form-control" placeholder="nom@movegasy.mg" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">SE CONNECTER</button>
        </form>
    </div>
</body>

</html>
