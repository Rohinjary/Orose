<!DOCTYPE html>

<html lang="fr" style="">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Move Gasy — Mon Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
<style>
        :root {
            --mg-primary: #1a1a1a;
            --mg-secondary: #4a4a4a;
            --mg-surface: #f7f9fb;
            --mg-surface-bright: #ffffff;
            --mg-surface-container: #eceef0;
            --mg-outline: #d1d5db;
            --mg-success: #10b981;
            --mg-warning: #f59e0b;
            --mg-danger: #ef4444;
            --radius: 4px;
            --sidebar-w: 240px;
            --topbar-h: 64px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--mg-surface);
            color: var(--mg-primary);
            font-size: 13.5px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-w);
            background: var(--mg-surface-bright);
            border-right: 1px solid var(--mg-outline);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            height: var(--topbar-h);
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--mg-outline);
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background: var(--mg-primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .brand-name {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.02em;
        }

        .nav-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 12px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--mg-secondary);
            margin: 24px 12px 8px;
            letter-spacing: 0.05em;
        }

        .nav-label:first-child {
            margin-top: 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius);
            color: var(--mg-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--mg-surface-container);
            color: var(--mg-primary);
        }

        .nav-item.active {
            background: var(--mg-primary);
            color: white;
        }

        .nav-icon {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }

        .main-wrapper {
            margin-left: var(--sidebar-w);
            width: calc(100% - var(--sidebar-w));
        }

        .topbar {
            height: var(--topbar-h);
            background: var(--mg-surface-bright);
            border-bottom: 1px solid var(--mg-outline);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--mg-secondary);
        }

        .breadcrumb span.active {
            color: var(--mg-primary);
            font-weight: 600;
        }

        .breadcrumb .sep {
            color: var(--mg-outline);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--mg-secondary);
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: var(--mg-surface-container);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 16px;
            border-left: 1px solid var(--mg-outline);
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: var(--mg-primary);
            color: white;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
        }

        .content {
            padding: 32px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-section {
            margin-bottom: 32px;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--mg-primary);
        }

        .header-sub {
            font-size: 14px;
            color: var(--mg-secondary);
            margin-top: 4px;
        }

        .card {
            background: var(--mg-surface-bright);
            border: 1px solid var(--mg-outline);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--mg-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn {
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            justify-content: center;
        }

        .btn-primary {
            background: var(--mg-primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border-color: var(--mg-outline);
            color: var(--mg-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--mg-secondary);
            display: block;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--mg-outline);
            border-radius: var(--radius);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            color: var(--mg-primary);
            background: var(--mg-surface-bright);
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--mg-primary);
        }

        .form-control:disabled {
            background: var(--mg-surface);
            color: var(--mg-secondary);
            cursor: not-allowed;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
        <div class="sidebar-overlay"></div>
    <div class="layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-logo"><i class="bi bi-water"></i></div>
                <div class="brand-name">MOVE GASY</div>
            </div>
            <div class="nav-container">
                <div class="nav-label">Portail</div>
                <a class="nav-item" href="#">
                    <span class="nav-icon"><i class="bi bi-speedometer2"></i></span> Dashboard
                </a>
                <a class="nav-item" href="#">
                    <span class="nav-icon"><i class="bi bi-cart3"></i></span> Commandes
                </a>
                <a class="nav-item" href="#">
                    <span class="nav-icon"><i class="bi bi-file-earmark-text"></i></span> Factures
                </a>
                <div class="nav-label">Compte</div>
                <a class="nav-item active" href="#">
                    <span class="nav-icon"><i class="bi bi-person-circle"></i></span> Mon Profil
                </a>
                <a class="nav-item" href="#">
                    <span class="nav-icon"><i class="bi bi-box-arrow-right"></i></span> Déconnexion
                </a>
            </div>
        </aside>
        <div class="main-wrapper">
            <!-- TOPBAR -->
            <header class="topbar">
                
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>
<div class="breadcrumb"><span>Portail Client</span><span class="sep">/</span><span class="active">Mon
                        Profil</span></div>
                <div class="topbar-actions">
                    <button class="icon-btn"><i class="bi bi-bell"></i></button>
                    <div class="user-profile">
                        <div class="avatar">JD</div>
                    </div>
                </div>
            </header>
            <!-- MAIN CONTENT -->
            <main class="content">
                <header class="header-section">
                    <h2 class="header-title">Mon Profil</h2>
                    <p class="header-sub">Gérez vos informations personnelles et votre mot de passe.</p>
                </header>
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Informations Personnelles</h3>
                    </div>
                    <form>
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="form-label">Nom / Raison sociale</label>
                                <input class="form-control" type="text" value="Jean Dupont" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Type de client</label>
                                <input class="form-control" disabled="" type="text" value="Grossiste" />
                            </div>
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="form-label">Téléphone</label>
                                <input class="form-control" type="tel" value="+261 34 00 000 00" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input class="form-control" type="email" value="jean.dupont@email.mg" />
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">Adresse / Ville</label>
                            <input class="form-control" type="text" value="Lot IVG 123 Bis, Antananarivo 101" />
                        </div>
                    </form>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Sécurité</h3>
                    </div>
                    <form>
                        <div class="form-group">
                            <label class="form-label">Ancien mot de passe</label>
                            <input class="form-control" placeholder="••••••••" type="password" />
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="form-label">Nouveau mot de passe</label>
                                <input class="form-control" placeholder="Entrez le nouveau mot de passe"
                                    type="password" />
                            </div>
                            <div class="form-group">
                                <label class="form-label">Confirmer le mot de passe</label>
                                <input class="form-control" placeholder="Confirmez le nouveau mot de passe"
                                    type="password" />
                            </div>
                        </div>
                        <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
                            <button class="btn btn-primary" type="submit">Mettre à jour</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('open');
        }
        document.querySelector('.sidebar-overlay')
            ?.addEventListener('click', () => {
                document.querySelector('.sidebar').classList.remove('open');
                document.querySelector('.sidebar-overlay').classList.remove('open');
            });
    </script>
</body>

</html>
