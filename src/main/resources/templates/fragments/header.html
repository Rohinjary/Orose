<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title layout:fragment="page-title">Move Gasy</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
    <style>
        :root {
            --mg-surface: #f7f9fb;
            --mg-surface-dim: #d8dadc;
            --mg-surface-bright: #ffffff;
            --mg-surface-container: #eceef0;
            --mg-primary: #1a1a1a;
            --mg-secondary: #4a4a4a;
            --mg-outline: #d1d5db;
            --mg-success: #10b981;
            --mg-warning: #f59e0b;
            --mg-danger: #ef4444;
            --mg-info: #3b82f6;
            --mg-text-muted: #64748b;
            --mg-text-light: #94a3b8;
            --font-main: 'Inter', sans-serif;
            --radius: 4px;
            --sidebar-w: 240px;
            --topbar-h: 64px;
        }
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: var(--font-main);
            background-color: var(--mg-surface);
            color: var(--mg-primary);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: var(--sidebar-w);
            background: var(--mg-surface-bright);
            border-right: 1px solid var(--mg-outline);
            position: fixed;
            top: 0; left: 0; bottom: 0;
            display: flex; flex-direction: column;
            z-index: 100; transition: transform 0.3s ease;
        }
        .sidebar-brand {
            height: var(--topbar-h); padding: 0 24px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--mg-outline);
        }
        .brand-logo {
            width: 32px; height: 32px; background: var(--mg-primary);
            border-radius: var(--radius); display: flex;
            align-items: center; justify-content: center;
            font-size: 18px; color: white;
        }
        .brand-name { font-weight: 700; font-size: 16px; letter-spacing: -0.02em; }
        .nav-container { flex: 1; overflow-y: auto; padding: 24px 12px; }
        .nav-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            color: var(--mg-secondary); margin: 24px 12px 8px; letter-spacing: 0.05em;
        }
        .nav-label:first-child { margin-top: 0; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border-radius: var(--radius);
            color: var(--mg-secondary); text-decoration: none;
            font-size: 14px; font-weight: 500; transition: all 0.2s;
            cursor: pointer; margin-bottom: 2px;
        }
        .nav-item:hover { background: var(--mg-surface-container); color: var(--mg-primary); }
        .nav-item.active { background: var(--mg-primary); color: white; }
        .nav-icon { font-size: 18px; width: 20px; text-align: center; }
        .chevron-icon { margin-left: auto; transition: transform 0.2s; }
        .nav-dropdown { display: flex; flex-direction: column; }
        .submenu {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease-out; padding-left: 24px;
            display: flex; flex-direction: column; gap: 2px;
        }
        .nav-dropdown.open .submenu { max-height: 400px; }
        .nav-dropdown.open .chevron-icon { transform: rotate(90deg); }
        .sub-nav-item {
            display: flex; align-items: center; padding: 8px 12px;
            color: var(--mg-text-muted); text-decoration: none;
            font-size: 13px; font-weight: 500; border-radius: var(--radius);
            transition: all 0.2s;
        }
        .sub-nav-item:hover { background: var(--mg-surface-container); color: var(--mg-primary); }
        .topbar {
            position: fixed; top: 0; left: var(--sidebar-w); right: 0;
            z-index: 90; height: var(--topbar-h); background: var(--mg-surface-bright);
            border-bottom: 1px solid var(--mg-outline); display: flex;
            align-items: center; padding: 0 32px; justify-content: space-between;
        }
        .menu-toggle {
            background: transparent; border: none; font-size: 24px;
            cursor: pointer; display: none; color: var(--mg-primary); margin-right: 12px;
        }
        .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--mg-secondary); }
        .breadcrumb span.active, .breadcrumb-current { color: var(--mg-primary); font-weight: 600; }
        .breadcrumb-separator { color: var(--mg-outline); }
        .topbar-actions { display: flex; align-items: center; gap: 16px; }
        .notification-btn {
            width: 36px; height: 36px; display: flex; align-items: center;
            justify-content: center; border-radius: var(--radius); border: none;
            background: transparent; color: var(--mg-text-muted); cursor: pointer; position: relative;
        }
        .notification-btn:hover { background: #f1f5f9; }
        .notification-dot {
            position: absolute; top: 8px; right: 8px; width: 8px; height: 8px;
            background: var(--mg-danger); border: 2px solid white; border-radius: 50%;
        }
        .user-profile { display: flex; align-items: center; gap: 12px; padding-left: 16px; border-left: 1px solid #e2e8f0; }
        .user-info { text-align: right; }
        .user-name { font-size: 13px; font-weight: 700; line-height: 1.2; }
        .user-role { font-size: 11px; color: var(--mg-text-muted); line-height: 1.2; }
        .user-avatar {
            width: 32px; height: 32px; background: var(--mg-primary); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 12px; border-radius: var(--radius);
        }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 99; }
        .sidebar-overlay.open { display: block; }
        main { margin-left: var(--sidebar-w); padding-top: var(--topbar-h); min-height: 100vh; }
        .container { max-width: 1152px; margin: 0 auto; padding: 32px; }
        
        /* Styles spécifiques des composants (Optionnel : déplaçable dans les vues dédiées) */
        .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
        .kpi-card { background: white; padding: 20px; border: 1px solid #e2e8f0; border-radius: var(--radius); box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05); }
        .kpi-label { font-size: 11px; font-weight: 700; color: var(--mg-text-light); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .kpi-value { font-size: 30px; font-weight: 700; }
        .text-red { color: var(--mg-danger); }
        .text-amber { color: var(--mg-warning); }
        .section-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; padding-bottom: 16px; margin-bottom: 16px; }
        .section-title { font-size: 18px; font-weight: 700; }
        .filter-controls { display: flex; align-items: center; gap: 12px; }
        .filter-label { font-size: 11px; font-weight: 700; color: var(--mg-text-light); text-transform: uppercase; }
        .filter-select { border: none; background: transparent; font-size: 12px; font-weight: 600; cursor: pointer; padding: 4px; }
        .filter-select:focus { outline: none; }
        .alert-card { background: white; border: 1px solid var(--mg-outline); border-radius: var(--radius); margin-bottom: 16px; display: flex; overflow: hidden; transition: transform 0.2s, opacity 0.2s; }
        .alert-urgent { border-left: 4px solid var(--mg-danger); }
        .alert-warning { border-left: 4px solid var(--mg-warning); }
        .alert-body { padding: 24px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .alert-header-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .badge-pill { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .bg-red-pill { background: #fee2e2; color: #b91c1c; }
        .bg-amber-pill { background: #fef3c7; color: #b45309; }
        .alert-category { font-size: 11px; font-family: monospace; font-weight: 700; text-transform: uppercase; letter-spacing: -0.02em; }
        .text-red-cat { color: var(--mg-danger); }
        .text-amber-cat { color: var(--mg-warning); }
        .alert-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .alert-desc { font-size: 14px; color: var(--mg-text-muted); }
        .alert-stats { margin-top: 24px; display: flex; gap: 40px; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .stat-label { font-size: 10px; font-weight: 700; color: var(--mg-text-light); text-transform: uppercase; margin-bottom: 2px; }
        .stat-value { font-size: 16px; font-weight: 700; }
        .stat-dim { color: var(--mg-text-muted); }
        .alert-action-side { background: #f8fafc; padding: 24px; width: 320px; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 16px; }
        .action-label { font-size: 11px; font-weight: 700; color: var(--mg-text-light); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .action-textarea { width: 100%; height: 96px; padding: 12px; border: 1px solid #e2e8f0; border-radius: var(--radius); font-size: 14px; resize: none; font-family: inherit; }
        .action-textarea:focus { outline: none; border-color: var(--mg-primary); box-shadow: 0 0 0 1px var(--mg-primary); }
        .btn-resolve { background: var(--mg-primary); color: white; padding: 12px; border: none; border-radius: var(--radius); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; transition: opacity 0.2s; }
        .btn-resolve:hover { opacity: 0.9; }
        .btn-resolve:disabled { opacity: 0.6; cursor: not-allowed; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .topbar { left: 0; padding: 0 16px; }
            .menu-toggle { display: block; }
            main { margin-left: 0; }
            .kpi-grid { grid-template-columns: 1fr; }
            .alert-card { flex-direction: column; }
            .alert-action-side { width: 100%; border-left: none; border-top: 1px solid #e2e8f0; }
        }
        
    </style>

    <th:block layout:fragment="page-styles"></th:block>
</head>
</html>
