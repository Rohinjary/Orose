<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liste des bassins</title>
    <style>body{font-family:Arial,Helvetica,sans-serif;margin:20px;}table{width:100%;border-collapse:collapse}th,td{padding:8px;border:1px solid #ddd}th{background:#f3f4f6;text-transform:uppercase;font-size:12px}</style>
</head>
<body>
    <h1>Liste des bassins</h1>
    <p><a th:href="@{/bassins/nouveau}">+ Nouveau bassin</a></p>

    <div th:if="${!bassins.empty}">
        <table>
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Surface (m²)</th>
                    <th>Profondeur (m)</th>
                    <th>Statut</th>
                    <th>Notes</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="bassin : ${bassins}">
                    <td th:text="${bassin.code}">B01</td>
                    <td th:text="${bassin.surfaceM2}">120.00</td>
                    <td th:text="${bassin.profondeurMetre}">1.50</td>
                    <td th:text="${bassin.statutActuel != null ? bassin.statutActuel.libelle : 'N/A'}">Actif</td>
                    <td th:text="${bassin.notes != null ? bassin.notes : '-'}">-</td>
                    <td>
                        <a th:href="@{/bassins/{id}(id=${bassin.id})}">Voir</a> |
                        <a th:href="@{/bassins/{id}/modifier(id=${bassin.id})}">Modifier</a>
                        <form th:action="@{/bassins/{id}/supprimer(id=${bassin.id})}" method="post" style="display:inline">
                            <button type="submit" onclick="return confirm('Supprimer ?')">Supprimer</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${bassins.empty}">
        <p>Aucun bassin enregistré.</p>
    </div>
</body>
</html>
