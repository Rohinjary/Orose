<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title th:text="${modeEdition} ? 'Modifier pesée' : 'Nouvelle pesée'">Pesée — Move Gasy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="/css/biologique/detail.css" rel="stylesheet" />
</head>
<body>
    <div class="sidebar-overlay"></div>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-logo"><i class="bi bi-water"></i></div>
                <div class="brand-name">MOVE GASY</div>
            </div>
            <div class="nav-container">
                <div class="nav-label">Terrain</div>
                <a class="nav-item" th:href="@{/bassins}"><span class="nav-icon"><i class="bi bi-droplet-half"></i></span> Bassins</a>
                <a class="nav-item active" th:href="@{/biologique}"><span class="nav-icon"><i class="bi bi-activity"></i></span> Suivi biologique</a>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="topbar">
                <button class="menu-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
                <div class="breadcrumb">
                    <span>Suivi biologique</span>
                    <span class="sep">/</span>
                    <span class="active" th:text="${modeEdition} ? 'Modifier pesée' : 'Nouvelle pesée'">Pesée</span>
                </div>
            </header>

            <main class="content">
                <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>
                <div th:if="${succes}" class="alert alert-success" th:text="${succes}"></div>

                <div class="detail-header">
                    <h1 th:text="${modeEdition} ? 'Modifier pesée' : 'Nouvelle pesée'">Nouvelle pesée</h1>
                    <p class="page-subtitle">
                        Bassin <strong th:text="${assoc.bassin.code}">B01</strong> ·
                        Cycle <strong th:text="${assoc.cycle.codeUniqueCycle}">C01</strong>
                    </p>
                    <p class="page-subtitle">Effectif initial : <strong th:text="${assoc.effectifInitial}">0</strong> post-larves</p>
                </div>

                <section class="card" style="padding: 24px;">
                    <form th:action="${modeEdition} ? @{/biologique/pesee/{id}/modifier(id=${idPesee})} : @{/biologique/{id}/pesee/nouvelle(id=${idCycleBassinAssoc})}"
                          th:object="${peseeDTO}" method="post">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Date du suivi</label>
                                <input type="date" class="form-control" th:field="*{dateSuivi}" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Technicien</label>
                                <select class="form-select" th:field="*{idTechnicien}" required>
                                    <option value="">— Sélectionner —</option>
                                    <option th:each="t : ${techniciens}" th:value="${t.id}"
                                            th:text="${t.nom + ' ' + (t.prenom != null ? t.prenom : '')}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Poids moyen (g)</label>
                                <input type="number" step="0.01" min="0.01" class="form-control" id="poidsMoyen"
                                       th:field="*{poidsMoyenGramme}" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Taille moyenne (mm)</label>
                                <input type="number" step="0.01" min="0.01" class="form-control" id="tailleMoyenne"
                                       th:field="*{tailleMoyenneMm}" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Nombre vivants</label>
                                <input type="number" min="0" class="form-control" th:field="*{nbVivants}" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Nombre morts</label>
                                <input type="number" min="0" class="form-control" th:field="*{nbMorts}" value="0" />
                            </div>
                            <div class="col-12">
                                <label class="form-label">Notes</label>
                                <textarea class="form-control" rows="3" th:field="*{notes}"></textarea>
                            </div>
                        </div>

                        <div id="seuilRecolte" class="alert alert-success mt-3" style="display:none;">
                            ⚠️ Seuil de récolte atteint !
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Enregistrer
                            </button>
                            <a th:href="@{/biologique/{id}/detail(id=${idCycleBassinAssoc})}" class="btn btn-outline-secondary">Annuler</a>
                        </div>
                    </form>
                </section>
            </main>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.querySelector('.sidebar-overlay').classList.toggle('open');
        }
        function checkSeuilRecolte() {
            const poids = parseFloat(document.getElementById('poidsMoyen').value) || 0;
            const taille = parseFloat(document.getElementById('tailleMoyenne').value) || 0;
            document.getElementById('seuilRecolte').style.display =
                (poids >= 15 && taille >= 110) ? 'block' : 'none';
        }
        document.getElementById('poidsMoyen').addEventListener('input', checkSeuilRecolte);
        document.getElementById('tailleMoyenne').addEventListener('input', checkSeuilRecolte);
        checkSeuilRecolte();
    </script>
</body>
</html>
